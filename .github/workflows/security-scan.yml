name: Security Scan

on:
  workflow_call:
    inputs:
      image-name:
        required: true
        type: string
      registry:
        required: true
        type: string

permissions:
  contents: read

jobs:
  git-leaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION="8.18.4"
          curl -sSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run Gitleaks — full history scan
        run: |
          gitleaks detect \
            --source . \
            --log-opts="--all" \
            --config .gitleaks.toml \
            --report-format sarif \
            --report-path gitleaks-report.sarif \
            --exit-code 1 || GITLEAKS_EXIT=$?

          if [ ! -f gitleaks-report.sarif ]; then
            echo '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"Gitleaks","version":"8.18.4","rules":[]}},"results":[]}]}' \
              > gitleaks-report.sarif
          fi

          exit ${GITLEAKS_EXIT:-0}

      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13
        with:
          sarif_file: gitleaks-report.sarif
          category: gitleaks

  semgrep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install Semgrep
        run: pip install semgrep==1.67.0

      - name: Run Semgrep — blocking rules (secrets)
        run: |
          semgrep scan \
            --config p/secrets \
            --sarif --output semgrep-secrets.sarif \
            --error \
            src/ || true

      - name: Run Semgrep — custom taint rules (blocking)
        run: |
          semgrep scan \
            --config policies/semgrep/ \
            --sarif --output semgrep-custom.sarif \
            --error \
            src/

      - name: Run Semgrep — advisory rules (non-blocking)
        run: |
          semgrep scan \
            --config p/python \
            --sarif --output semgrep-advisory.sarif \
            --no-error \
            src/ || true

      - name: Upload Semgrep SARIF — secrets
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13
        with:
          sarif_file: semgrep-secrets.sarif
          category: semgrep-secrets

      - name: Upload Semgrep SARIF — custom rules
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13
        with:
          sarif_file: semgrep-custom.sarif
          category: semgrep-custom

      - name: Upload Semgrep SARIF — advisory
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13
        with:
          sarif_file: semgrep-advisory.sarif
          category: semgrep-advisory

  trivy-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Build image for scanning
        run: |
          docker build -t ${{ inputs.registry }}/${{ inputs.image-name }}:${{ github.sha }} .

      - name: Install Trivy
        run: |
          TRIVY_VERSION="0.69.3"
          mkdir -p "$HOME/.local/bin"
          curl -sfL \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            -o trivy.tar.gz
          tar -xzf trivy.tar.gz trivy
          install -m 0755 trivy "$HOME/.local/bin/trivy"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/trivy" --version

      - name: Trivy image scan — CRITICAL summary
        if: always()
        run: |
          trivy image \
            --scanners vuln \
            --skip-version-check \
            --ignore-unfixed \
            --severity CRITICAL \
            ${{ inputs.registry }}/${{ inputs.image-name }}:${{ github.sha }} || true

      - name: Trivy image scan — CRITICAL with fix available (blocking)
        run: |
          set +e
          trivy image \
            --scanners vuln \
            --skip-version-check \
            --ignore-unfixed \
            --severity CRITICAL \
            --format sarif \
            --output trivy-critical.sarif \
            ${{ inputs.registry }}/${{ inputs.image-name }}:${{ github.sha }}
          TRIVY_EXIT=$?

          if [ ! -f trivy-critical.sarif ]; then
            echo '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"Trivy","rules":[]}},"results":[]}]}' \
              > trivy-critical.sarif
          fi

          exit $TRIVY_EXIT

      - name: Trivy image scan — HIGH,MEDIUM advisory
        if: always()
        run: |
          trivy image \
            --scanners vuln \
            --skip-version-check \
            --ignore-unfixed \
            --severity HIGH,MEDIUM \
            --format sarif \
            --output trivy-advisory.sarif \
            ${{ inputs.registry }}/${{ inputs.image-name }}:${{ github.sha }} || true

          if [ ! -f trivy-advisory.sarif ]; then
            echo '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"Trivy","rules":[]}},"results":[]}]}' \
              > trivy-advisory.sarif
          fi

      - name: Upload Trivy SARIF — critical
        if: always() && hashFiles('trivy-critical.sarif') != ''
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13
        with:
          sarif_file: trivy-critical.sarif
          category: trivy-critical

      - name: Upload Trivy SARIF — advisory
        if: always() && hashFiles('trivy-advisory.sarif') != ''
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13
        with:
          sarif_file: trivy-advisory.sarif
          category: trivy-advisory

  trivy-iac:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install Trivy
        run: |
          TRIVY_VERSION="0.69.3"
          mkdir -p "$HOME/.local/bin"
          curl -sfL \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            -o trivy.tar.gz
          tar -xzf trivy.tar.gz trivy
          install -m 0755 trivy "$HOME/.local/bin/trivy"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/trivy" --version

      - name: Trivy IaC scan — Kubernetes manifests summary
        if: always()
        run: |
          trivy config \
            --skip-version-check \
            --severity CRITICAL,HIGH \
            --ignorefile .trivyignore \
            k8s/ || true

      - name: Trivy IaC scan — Kubernetes manifests
        run: |
          set +e
          trivy config \
            --skip-version-check \
            --severity CRITICAL,HIGH \
            --ignorefile .trivyignore \
            --format sarif \
            --output trivy-iac-k8s.sarif \
            k8s/
          TRIVY_EXIT=$?

          if [ ! -f trivy-iac-k8s.sarif ]; then
            echo '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"Trivy","rules":[]}},"results":[]}]}' \
              > trivy-iac-k8s.sarif
          fi

          exit $TRIVY_EXIT

      - name: Trivy IaC scan — Dockerfile
        if: always()
        run: |
          trivy config \
            --skip-version-check \
            --ignorefile .trivyignore \
            --format sarif \
            --output trivy-iac-docker.sarif \
            Dockerfile || true

          if [ ! -f trivy-iac-docker.sarif ]; then
            echo '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"Trivy","rules":[]}},"results":[]}]}' \
              > trivy-iac-docker.sarif
          fi

      - name: Upload Trivy IaC SARIF — Kubernetes
        if: always() && hashFiles('trivy-iac-k8s.sarif') != ''
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13
        with:
          sarif_file: trivy-iac-k8s.sarif
          category: trivy-iac-k8s

      - name: Upload Trivy IaC SARIF — Dockerfile
        if: always() && hashFiles('trivy-iac-docker.sarif') != ''
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13
        with:
          sarif_file: trivy-iac-docker.sarif
          category: trivy-iac-dockerfile

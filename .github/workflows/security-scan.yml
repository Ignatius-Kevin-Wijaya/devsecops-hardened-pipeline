name: Security Scan

on:
  workflow_call:
    inputs:
      image-name:
        required: true
        type: string
      registry:
        required: true
        type: string

permissions:
  contents: read

jobs:
  git-leaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION="8.18.4"
          curl -sSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run Gitleaks — full history scan
        run: |
          gitleaks detect \
            --source . \
            --log-opts="--all" \
            --config .gitleaks.toml \
            --report-format sarif \
            --report-path gitleaks-report.sarif \
            --exit-code 1 || GITLEAKS_EXIT=$?

          if [ ! -f gitleaks-report.sarif ]; then
            echo '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"Gitleaks","version":"8.18.4","rules":[]}},"results":[]}]}' \
              > gitleaks-report.sarif
          fi

          exit ${GITLEAKS_EXIT:-0}

      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13
        with:
          sarif_file: gitleaks-report.sarif
          category: gitleaks

  semgrep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install Semgrep
        run: pip install semgrep==1.67.0

      - name: Run Semgrep — blocking rules (secrets)
        run: |
          semgrep scan \
            --config p/secrets \
            --sarif --output semgrep-secrets.sarif \
            --error \
            src/ || true

      - name: Run Semgrep — custom taint rules (blocking)
        run: |
          semgrep scan \
            --config policies/semgrep/ \
            --sarif --output semgrep-custom.sarif \
            --error \
            src/

      - name: Run Semgrep — advisory rules (non-blocking)
        run: |
          semgrep scan \
            --config p/python \
            --sarif --output semgrep-advisory.sarif \
            --no-error \
            src/ || true

      - name: Upload Semgrep SARIF — secrets
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13
        with:
          sarif_file: semgrep-secrets.sarif
          category: semgrep-secrets

      - name: Upload Semgrep SARIF — custom rules
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13
        with:
          sarif_file: semgrep-custom.sarif
          category: semgrep-custom

      - name: Upload Semgrep SARIF — advisory
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13
        with:
          sarif_file: semgrep-advisory.sarif
          category: semgrep-advisory

  trivy-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Build image for scanning
        run: |
          docker build -t ${{ inputs.registry }}/${{ inputs.image-name }}:${{ github.sha }} .

      - name: Trivy image scan — CRITICAL with fix available (blocking)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: ${{ inputs.registry }}/${{ inputs.image-name }}:${{ github.sha }}
          format: sarif
          output: trivy-critical.sarif
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          trivyignores: .trivyignore

      - name: Trivy image scan — HIGH,MEDIUM advisory
        if: always()
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: ${{ inputs.registry }}/${{ inputs.image-name }}:${{ github.sha }}
          format: sarif
          output: trivy-advisory.sarif
          severity: HIGH,MEDIUM
          ignore-unfixed: true
          exit-code: "0"
          trivyignores: .trivyignore

      - name: Upload Trivy SARIF — critical
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13
        with:
          sarif_file: trivy-critical.sarif
          category: trivy-critical

      - name: Upload Trivy SARIF — advisory
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13
        with:
          sarif_file: trivy-advisory.sarif
          category: trivy-advisory

  trivy-iac:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Trivy IaC scan — Kubernetes manifests
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: config
          scan-ref: k8s/
          format: sarif
          output: trivy-iac-k8s.sarif
          exit-code: "1"
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore

      - name: Trivy IaC scan — Dockerfile
        if: always()
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: config
          scan-ref: Dockerfile
          format: sarif
          output: trivy-iac-docker.sarif
          exit-code: "0"
          trivyignores: .trivyignore

      - name: Upload Trivy IaC SARIF — Kubernetes
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13
        with:
          sarif_file: trivy-iac-k8s.sarif
          category: trivy-iac-k8s

      - name: Upload Trivy IaC SARIF — Dockerfile
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13
        with:
          sarif_file: trivy-iac-docker.sarif
          category: trivy-iac-dockerfile
